{% extends 'base.html' %}
{% block content %}
<div class="center-card">
  <div class="login-card">
    <h2>Acesso ao sistema</h2>
    <p>Entre com o usuário demo para testar o sistema.</p>
    {% if error %}<div class="banner danger">{{ error }}</div>{% endif %}
    <form method="post" class="grid-form one-col">
      <input type="email" name="email" placeholder="E-mail" value="admin@demo.com" required />
      <input type="password" name="password" placeholder="Senha" value="123456" required />
      <button type="submit">Entrar</button>
    </form>
    <div class="demo-box">
      <strong>Login demo</strong>
      <span>E-mail: admin@demo.com</span>
      <span>Senha: 123456</span>
    </div>
  </div>
</div>
{% endblock %}
